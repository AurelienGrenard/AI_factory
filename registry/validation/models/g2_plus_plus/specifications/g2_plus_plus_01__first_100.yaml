title: Production slice g2_plus_plus_01__first_100
format: ai_factory.models.v1
database_id: g2_plus_plus_01__first_100
model_family: G2 Plus Plus
json_path: registry/validation/models/g2_plus_plus/data/g2_plus_plus_01__first_100.json
generation_script: registry/validation/models/g2_plus_plus/generators/g2_plus_plus_01__first_100.py
parameters:
  mean_reversion_x: Positive mean-reversion speed a of the first factor.
  volatility_x: Volatility sigma of the first factor.
  mean_reversion_y: Positive mean-reversion speed b of the second factor.
  volatility_y: Volatility eta of the second factor.
  rho: Brownian correlation between the two factors.
dynamics:
  measure: Risk-neutral
  representation: Deterministically shifted two-factor Gaussian model
  equations:
    first_factor: dx_t = -a x_t dt + sigma dW_t^x
    second_factor: dy_t = -b y_t dt + eta dW_t^y
    correlation: d<W^x,W^y>_t = rho dt
    short_rate: r_t = x_t + y_t + phi(t)
    curve_shift: phi(t) = f(0,t) + 0.5 dV(0,t)/dt
  initial_conditions:
    first_factor: x_0 = 0
    second_factor: y_0 = 0
construction:
  row_count: 100
  method: production database slice
  rule: first rows
  source_database_id: g2_plus_plus_01
