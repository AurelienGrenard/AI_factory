title: Production slice heston_02__first_100
format: ai_factory.models.v1
database_id: heston_02__first_100
model_family: Heston
json_path: registry/validation/models/heston/data/heston_02__first_100.json
generation_script: registry/validation/models/heston/generators/heston_02__first_100.py
parameters:
  spot: Initial spot.
  risk_free_rate: Continuously compounded risk-free rate.
  dividend_yield: Continuously compounded dividend yield.
  initial_variance: Initial variance v0.
  theta: Long-run variance theta.
  kappa: Variance mean-reversion speed kappa.
  volatility_of_variance: Volatility of variance gamma.
  rho: Spot/variance Brownian correlation rho.
dynamics:
  measure: Risk-neutral
  equations:
    spot: dS_t / S_t = (r - q) dt + sqrt(V_t) dW_t^S
    variance: dV_t = kappa (theta - V_t) dt + gamma sqrt(V_t) dW_t^V
    correlation: d<W^S, W^V>_t = rho dt
  initial_conditions:
    spot: S_0 = spot
    variance: V_0 = initial_variance
construction:
  row_count: 100
  method: production database slice
  rule: first rows
  source_database_id: heston_02
source_json_path: registry/production/models/heston/data/heston_02.json
source_yaml_path: registry/production/models/heston/specifications/heston_02.yaml
