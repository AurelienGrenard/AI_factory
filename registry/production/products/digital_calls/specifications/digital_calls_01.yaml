title: Cash-or-nothing digital call production product parameter database digital_calls_01
format: ai_factory.products.v1
database_id: digital_calls_01
product_family: Digital Calls
json_path: registry/production/products/digital_calls/data/digital_calls_01.json
generation_script: registry/production/products/digital_calls/generators/digital_calls_01.py
parameters:
  strike: Strike in normalized spot units.
  maturity: Maturity in years.
payoff:
  expression: 1 if S_T > K else 0
  scaling_rule: V(s, K) = V(1, K / s)
