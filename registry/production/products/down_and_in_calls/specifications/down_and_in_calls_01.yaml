title: Down-and-in call production product parameter database down_and_in_calls_01
format: ai_factory.products.v1
database_id: down_and_in_calls_01
product_family: Down And In Calls
json_path: registry/production/products/down_and_in_calls/data/down_and_in_calls_01.json
generation_script: registry/production/products/down_and_in_calls/generators/down_and_in_calls_01.py
parameters:
  strike: Strike in normalized spot units.
  barrier: Discrete barrier in normalized spot units.
  maturity: Maturity in years.
  observation_count: Number of equally spaced monitoring dates, round(52T).
  rebate: Cash rebate, fixed to zero for this database.
payoff:
  expression: 1_{min_i S(t_i) <= B} * max(S_T - K, 0)
  scaling_rule: V(s, K, B) = s * V(1, K / s, B / s)
construction:
  row_count: 1000
  method: random sample
  rule: T is uniform on [1/12, 3], log(K) is uniform on [-a sqrt(T), a sqrt(T)], and
    the barrier is sampled conditionally on its direction.
  rng: Project Philox-4x32-10 generator
  seed: 735000001
  bounds:
    maturity:
    - 1/12
    - 3.0
    log_strike_given_maturity: uniform on [-a sqrt(T), a sqrt(T)]
    a: 0.3
    barrier:
    - 0.55
    - 0.95
