title: Rough Bergomi production model parameter database rough_bergomi_01
format: ai_factory.models.v1
database_id: rough_bergomi_01
model_family: Rough Bergomi
json_path: registry/production/models/rough_bergomi/data/rough_bergomi_01.json
generation_script: registry/production/models/rough_bergomi/generators/rough_bergomi_01.py
parameters:
  spot: Initial spot.
  risk_free_rate: Continuously compounded risk-free rate.
  dividend_yield: Continuously compounded dividend yield.
  forward_variance: Flat initial forward variance xi_0.
  eta: Rough Bergomi volatility of volatility eta.
  hurst: Hurst exponent H.
  correlation: Spot/volatility Brownian correlation rho.
dynamics:
  measure: Risk-neutral
  equations:
    spot: dS_t / S_t = (r - q) dt + sqrt(V_t) dZ_t
    variance: V_t = xi_0(t) exp(eta W_tilde_t^H - 0.5 eta^2 t^(2H))
    volterra_process: W_tilde_t^H = sqrt(2H) integral_0^t (t - s)^(H - 0.5) dW_s
    correlation: d<Z, W>_t = rho dt
  initial_forward_variance:
    convention: xi_0(t) is flat
    value: xi_0(t) = forward_variance
construction:
  row_count: 1000
  method: random sample
  rule: All model parameters are sampled independently and uniformly.
  values:
    rng: Project Philox-4x32-10 generator
    seed: 720000001
    spot: 1.0
    risk_free_rate: 0.0
    dividend_yield: 0.0
    bounds:
      hurst:
      - 0.01
      - 0.4
      eta:
      - 1.0
      - 3.0
      correlation:
      - -0.95
      - -0.3
      forward_variance:
      - 0.01
      - 0.12
